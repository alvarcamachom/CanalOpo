            {

                    "a) 30 días",
                    "b) 15 días",
                    "c) 25 días"
                ],
                correct: 1
            },
            {
                text: "Una empresa está fabricando una máquina con sus propios medios. Para ello, durante el primer año, ha pagado los siguientes gastos: 25.000 € por sueldos y salarios y 12.000 € por los materiales. La fabricación de la máquina no ha concluido al final del ejercicio. Por tanto, en el cierre del ejercicio:",
                options: [
                    "a) Habrá reconocido un ingreso por Trabajos realizados para el Inmovilizado Material en curso por 37.000 €",
                    "b) Habrá reconocido un incremento en el Inmovilizado Material en curso por 12.000 €",

    }
};

const container = document.getElementById('quiz-container');
const titleElement = document.getElementById('exam-title');
let examState = { total: 0, correct: 0, wrong: 0, answered: 0 };

function loadExam(examKey) {
    container.innerHTML = ''; 
    const exam = data[examKey];
    titleElement.textContent = exam.title;

    examState.total = exam.questions.length;
    examState.correct = 0;
    examState.wrong = 0;
    examState.answered = 0;

    exam.questions.forEach((q, qIndex) => {
        const block = document.createElement('div');
        block.className = 'question-block';
        
        let html = `<div class="question-text">${qIndex + 1}. ${q.text}</div>`;
        html += `<div id="options_${qIndex}">`;
        
        q.options.forEach((opt, optIndex) => {
            html += `
                <label class="option" id="label_${qIndex}_${optIndex}">
                    <input type="radio" name="q${qIndex}" value="${optIndex}" 
                    onclick="checkAnswer(${qIndex}, ${optIndex}, ${q.correct}, '${examKey}')">
                    ${opt}
                </label>
            `;
        });
        
        html += `</div><div id="feedback_${qIndex}" class="feedback"></div>`;
        block.innerHTML = html;
        container.appendChild(block);
    });

    const finishBtn = document.createElement('button');
    finishBtn.textContent = 'Finalizar Examen';
    finishBtn.className = 'finish-btn';
    finishBtn.onclick = calculateResults;
    container.appendChild(finishBtn);

    const resultsDiv = document.createElement('div');
    resultsDiv.id = 'exam-results';
    resultsDiv.className = 'results-container';
    container.appendChild(resultsDiv);
}

function checkAnswer(qIndex, selectedIndex, correctIndex, examKey) {
    const optionsDiv = document.getElementById(`options_${qIndex}`);
    const feedbackDiv = document.getElementById(`feedback_${qIndex}`);
    const inputs = optionsDiv.querySelectorAll('input');

    inputs.forEach(input => input.disabled = true);
    examState.answered++;

    if (selectedIndex === correctIndex) {
        feedbackDiv.textContent = "¡Respuesta Correcta!";
        feedbackDiv.className = "feedback correct";
        examState.correct++;
    } else {
        feedbackDiv.textContent = "Respuesta Incorrecta.";
        feedbackDiv.className = "feedback incorrect";
        examState.wrong++;
        
        const correctLabel = document.getElementById(`label_${qIndex}_${correctIndex}`);
        correctLabel.classList.add("highlight-correct");
    }
}

function calculateResults() {
    const unanswered = examState.total - examState.answered;
    const score = examState.correct - (examState.wrong / 3);

    const resultsDiv = document.getElementById('exam-results');
    resultsDiv.style.display = 'block';
    resultsDiv.innerHTML = `
        <h2>Resultados Finales</h2>
        <p>Total de preguntas: <strong>${examState.total}</strong></p>
        <p>Respuestas correctas: <strong style="color: #155724;">${examState.correct}</strong></p>
        <p>Respuestas incorrectas: <strong style="color: #721c24;">${examState.wrong}</strong></p>
        <p>Preguntas sin responder: <strong>${unanswered}</strong></p>
        <p class="score">Puntuación Final: ${score.toFixed(2)}</p>
    `;

    const allInputs = document.querySelectorAll('.question-block input[type="radio"]');
    allInputs.forEach(input => input.disabled = true);

    const finishBtn = document.querySelector('.finish-btn');
    if(finishBtn) finishBtn.style.display = 'none';
    
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
